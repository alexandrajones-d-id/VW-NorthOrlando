<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volkswagen North Orlando – AI Advisor</title>
  <style>
    :root {
      --vw-blue: #001E50;
      --vw-light-blue: #00B0F0;
      --vw-silver: #C0C8D2;
      --vw-white: #FFFFFF;
      --vw-dark: #0A1628;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--vw-dark);
      color: var(--vw-white);
      min-height: 100vh;
    }

    header {
      background: var(--vw-blue);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid var(--vw-light-blue);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-area { display: flex; align-items: center; gap: 14px; }
    .vw-logo { width: 48px; height: 48px; }

    .dealer-name h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      line-height: 1.1;
    }
    .dealer-name span {
      font-size: 0.7rem;
      color: var(--vw-light-blue);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .header-nav {
      display: flex;
      gap: 28px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .header-nav a {
      color: var(--vw-silver);
      text-decoration: none;
      transition: color 0.2s;
    }
    .header-nav a:hover { color: var(--vw-light-blue); }

    .hero {
      display: flex;
      align-items: stretch;
      min-height: calc(100vh - 83px);
      background: linear-gradient(135deg, var(--vw-blue) 0%, #002a6e 45%, var(--vw-dark) 100%);
      overflow: hidden;
    }

    .hero-text {
      flex: 0 0 42%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 48px;
      position: relative;
      z-index: 2;
    }

    .online-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(0,176,240,0.15);
      border: 1px solid var(--vw-light-blue);
      border-radius: 30px;
      padding: 5px 14px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--vw-light-blue);
      margin-bottom: 24px;
      width: fit-content;
    }

    .online-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .hero-text h2 {
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 16px;
    }
    .hero-text h2 em { font-style: normal; color: var(--vw-light-blue); }

    .hero-text p {
      font-size: 1rem;
      color: var(--vw-silver);
      line-height: 1.7;
      margin-bottom: 28px;
      max-width: 380px;
    }

    .service-pills {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(0,176,240,0.3);
      border-radius: 30px;
      padding: 7px 16px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--vw-silver);
    }
    .pill svg { width: 14px; height: 14px; color: var(--vw-light-blue); }

    .start-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--vw-light-blue);
      color: var(--vw-blue);
      font-weight: 800;
      font-size: 1rem;
      padding: 16px 36px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(0,176,240,0.4);
      width: fit-content;
    }
    .start-btn:hover {
      background: #33C3FF;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,176,240,0.55);
    }
    .start-btn svg { width: 20px; height: 20px; }

    .hero-avatar {
      flex: 1;
      position: relative;
      display: flex;
      align-items: stretch;
      min-height: 600px;
    }

    .hero-avatar::before {
      content: '';
      position: absolute;
      left: 0; top: 10%; bottom: 10%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(0,176,240,0.4), transparent);
      z-index: 1;
    }

    #did-agent-container {
      flex: 1;
      width: 100%;
      position: relative;
    }

    .departments {
      padding: 80px 40px;
      background: var(--vw-dark);
    }

    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }
    .section-header h3 {
      font-size: 1.9rem;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .section-header h3 em { font-style: normal; color: var(--vw-light-blue); }
    .section-header p { color: var(--vw-silver); font-size: 0.95rem; }

    .dept-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      max-width: 1100px;
      margin: 0 auto;
    }
